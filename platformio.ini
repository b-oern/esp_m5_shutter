[env:m5stick-c]
platform = espressif32@6.3.2
board = m5stickc_plus2
framework = arduino

; Serial Monitor
monitor_speed = 115200

; Board-spezifische Einstellungen für StickC Plus2 (ESP32-PICO-V3-02)
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio

; Partition scheme mit mehr App-Speicher
board_build.partitions = min_spiffs.csv

; BLE benötigt mehr Stack/Heap
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_M5Stick_C_Plus2
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    https://github.com/m5stack/M5StickCPlus2.git